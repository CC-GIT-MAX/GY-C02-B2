# GitLab CI for C02-B2 仪表 MCU
# - IAR 构建在 Windows runner 上执行（tag: yuntu-windows-docker）
# - 静态扫描与提交规范检查为可选 stage，可手动触发

stages:
  - check
  - build
  - convert
  - release

variables:
  IAR: 'C:\MCU-Yuntu\TOOL\IAR_Systems\Embedded_Workbench_9.2\common\bin\iarbuild.exe'

# 提交规范与编码规范自检（本地脚本 + clang-format dry-run）
code-style-job:
  stage: check
  tags:
    - qt6-linux
  script:
    - bash tools/check.sh
  allow_failure: true   # 项目初期不强卡死，违规只警告

# IAR 构建
build-job:
  stage: build
  tags:
    - yuntu-windows-docker
  script:
    - mkdir -p result
    - '& "$IAR" EWARM/C02_B2.ewp -make FLASH -log warnings'
    - cp EWARM/FLASH/Exe/C02_B2.hex result/C02_B2.hex
  artifacts:
    paths:
      - result/
    expire_in: 1 week

# HEX → BIN 转换
convert-job:
  stage: convert
  needs: [build-job]
  tags:
    - qt6-linux
  script:
    - cd result
    - /home/gitlab-runner/tool/cut_hex_to_bin_sbl C02_B2.hex
  artifacts:
    paths:
      - result/C02_B2.bin
    expire_in: 1 week

release-job:
  stage: release
  needs: [convert-job]
  tags:
    - qt6-linux
  script:
    - echo "Release artifact: result/C02_B2.bin"
